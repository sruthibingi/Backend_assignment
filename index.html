<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c14;
      --surface: #0f1623;
      --surface2: #161e2e;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #6366f1;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID NOISE BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── AUTH PAGE ── */
    #auth-page {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--card-shadow), 0 0 60px rgba(59,130,246,0.08);
      animation: fadeUp 0.5s ease;
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }
    .auth-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .tab-row {
      display: flex;
      gap: 0;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.8rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.55rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; text-transform: uppercase; }
    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    select option { background: var(--surface2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast {
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: slideIn 0.3s ease;
      min-width: 260px;
      box-shadow: var(--card-shadow);
    }
    .toast.success { background: #064e3b; border: 1px solid var(--success); color: #6ee7b7; }
    .toast.error   { background: #450a0a; border: 1px solid var(--danger);  color: #fca5a5; }
    .toast.info    { background: #1e3a5f; border: 1px solid var(--accent);  color: #93c5fd; }

    /* ── APP LAYOUT ── */
    #app-page { display: none; position: relative; z-index: 1; min-height: 100vh; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, #3b82f6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .user-badge { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; }
    .role-pill { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-family: 'DM Mono', monospace; font-weight: 500; }
    .role-pill.admin { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .role-pill.user  { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }

    .main-content { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
    .stat-value.blue   { color: var(--accent); }
    .stat-value.yellow { color: var(--warning); }
    .stat-value.green  { color: var(--success); }
    .stat-value.purple { color: #a78bfa; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .toolbar-left { display: flex; gap: 0.6rem; flex-wrap: wrap; flex: 1; }
    .filter-select { width: auto; padding: 0.55rem 0.9rem; font-size: 0.85rem; }
    .search-input { max-width: 220px; padding: 0.55rem 1rem; font-size: 0.85rem; }

    /* ── TASK TABLE ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); }
    th {
      padding: 0.9rem 1.2rem;
      text-align: left;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    td { padding: 1rem 1.2rem; border-top: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .task-title { font-weight: 500; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-desc  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-todo        { background: rgba(100,116,139,0.2); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
    .badge-in_progress { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .badge-done        { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge-low    { background: rgba(16,185,129,0.1);  color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
    .badge-medium { background: rgba(245,158,11,0.1);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
    .badge-high   { background: rgba(239,68,68,0.1);   color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    .action-btns { display: flex; gap: 0.4rem; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; border-radius: 7px; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 0.8rem; opacity: 0.4; }

    /* ── PAGINATION ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1.2rem; border-top: 1px solid var(--border); }
    .page-info { font-size: 0.85rem; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: scaleIn 0.25s ease;
    }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; }
    .modal-footer { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    /* ── LOADING ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    .loading-row td { text-align: center; padding: 3rem; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn  { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
    @keyframes spin     { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════
  AUTH PAGE
════════════════════════════════════════════════ -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">TaskFlow</div>
    <div class="auth-subtitle">Scalable REST API · JWT Auth · RBAC</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">
        Sign In
      </button>
      <p style="font-size:0.78rem;color:var(--muted);margin-top:1rem;text-align:center;">
        Default admin: <code style="font-family:'DM Mono',monospace;">admin@taskflow.dev</code> / <code style="font-family:'DM Mono',monospace;">Admin123</code>
      </p>
    </div>

    <!-- Register -->
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 chars, 1 upper, 1 number" />
      </div>
      <button class="btn btn-primary btn-full" id="register-btn" onclick="handleRegister()">
        Create Account
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
  DASHBOARD
════════════════════════════════════════════════ -->
<div id="app-page">
  <!-- Topbar -->
  <nav class="topbar">
    <div class="topbar-logo">TaskFlow</div>
    <div class="topbar-right">
      <div class="user-badge">
        <span id="user-name-display">User</span>
        <span class="role-pill" id="role-pill">user</span>
      </div>
      <button class="btn btn-ghost" style="padding:0.45rem 0.9rem;font-size:0.82rem;" onclick="handleLogout()">
        Sign Out
      </button>
    </div>
  </nav>

  <div class="main-content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value blue" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">To Do</div>
        <div class="stat-value purple" id="stat-todo">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In Progress</div>
        <div class="stat-value yellow" id="stat-inprog">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Done</div>
        <div class="stat-value green" id="stat-done">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" id="search-input" placeholder="🔍 Search tasks…" oninput="debounceSearch()" />
        <select class="filter-select" id="filter-status" onchange="loadTasks()">
          <option value="">All Status</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <select class="filter-select" id="filter-priority" onchange="loadTasks()">
          <option value="">All Priority</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <select class="filter-select" id="filter-sort" onchange="loadTasks()">
          <option value="createdAt">Newest</option>
          <option value="dueDate">Due Date</option>
          <option value="priority">Priority</option>
          <option value="title">Title</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        + New Task
      </button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Task</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="task-tbody">
            <tr class="loading-row"><td colspan="5"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button class="btn btn-ghost btn-sm" id="prev-btn" onclick="changePage(-1)">← Prev</button>
        <span class="page-info" id="page-info">Page 1</span>
        <button class="btn btn-ghost btn-sm" id="next-btn" onclick="changePage(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
  TASK MODAL
════════════════════════════════════════════════ -->
<div id="task-modal" class="modal-overlay" style="display:none;" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <input type="hidden" id="modal-task-id" />

    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="modal-task-title" placeholder="What needs to be done?" maxlength="200" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="modal-task-desc" rows="3" placeholder="Optional details…" style="resize:vertical;"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="modal-task-status">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="modal-task-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input type="date" id="modal-task-due" />
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG — update BASE_URL to match your server
// ═══════════════════════════════════════════
const BASE_URL = window.location.origin;
const API = `${BASE_URL}/api/v1`;

// ── State ────────────────────────────────
let token = localStorage.getItem('tf_token') || null;
let currentUser = JSON.parse(localStorage.getItem('tf_user') || 'null');
let currentPage = 1;
let totalPages  = 1;
let searchTimer = null;

// ── Boot ─────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (token && currentUser) showDashboard();
});

// ── Tab Switch ───────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}

// ── Auth ─────────────────────────────────
async function handleLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return toast('Please fill in all fields', 'error');

  const btn = document.getElementById('login-btn');
  setLoading(btn, true);
  try {
    const data = await apiFetch('/auth/login', 'POST', { email, password }, false);
    token = data.data.accessToken;
    currentUser = data.data.user;
    localStorage.setItem('tf_token', token);
    localStorage.setItem('tf_user', JSON.stringify(currentUser));
    toast(`Welcome back, ${currentUser.name}!`, 'success');
    showDashboard();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(btn, false, 'Sign In');
  }
}

async function handleRegister() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return toast('Please fill in all fields', 'error');

  const btn = document.getElementById('register-btn');
  setLoading(btn, true);
  try {
    const data = await apiFetch('/auth/register', 'POST', { name, email, password }, false);
    token = data.data.accessToken;
    currentUser = data.data.user;
    localStorage.setItem('tf_token', token);
    localStorage.setItem('tf_user', JSON.stringify(currentUser));
    toast(`Account created! Welcome, ${currentUser.name}`, 'success');
    showDashboard();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(btn, false, 'Create Account');
  }
}

async function handleLogout() {
  try { await apiFetch('/auth/logout', 'POST'); } catch {}
  token = null; currentUser = null;
  localStorage.removeItem('tf_token');
  localStorage.removeItem('tf_user');
  document.getElementById('app-page').style.display  = 'none';
  document.getElementById('auth-page').style.display = 'flex';
  toast('Signed out successfully', 'info');
}

// ── Dashboard ─────────────────────────────
function showDashboard() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app-page').style.display  = 'block';
  document.getElementById('user-name-display').textContent = currentUser.name;
  const pill = document.getElementById('role-pill');
  pill.textContent = currentUser.role;
  pill.className = `role-pill ${currentUser.role}`;
  loadTasks();
}

// ── Tasks ─────────────────────────────────
async function loadTasks() {
  const tbody    = document.getElementById('task-tbody');
  const status   = document.getElementById('filter-status').value;
  const priority = document.getElementById('filter-priority').value;
  const sortBy   = document.getElementById('filter-sort').value;
  const search   = document.getElementById('search-input').value.trim();

  tbody.innerHTML = `<tr class="loading-row"><td colspan="5"><div class="spinner"></div></td></tr>`;

  let url = `/tasks?page=${currentPage}&limit=8&sortBy=${sortBy}&order=DESC`;
  if (status)   url += `&status=${status}`;
  if (priority) url += `&priority=${priority}`;
  if (search)   url += `&search=${encodeURIComponent(search)}`;

  try {
    const data = await apiFetch(url);
    const { data: tasks, pagination } = data;
    totalPages = pagination.totalPages || 1;

    document.getElementById('page-info').textContent = `Page ${pagination.page} of ${totalPages}`;
    document.getElementById('prev-btn').disabled = pagination.page <= 1;
    document.getElementById('next-btn').disabled = pagination.page >= totalPages;

    updateStats(tasks, pagination.total);
    renderTasks(tasks);
  } catch (e) {
    toast(e.message, 'error');
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--danger);padding:2rem;">${e.message}</td></tr>`;
  }
}

function updateStats(tasks, total) {
  document.getElementById('stat-total').textContent = total || 0;
  document.getElementById('stat-todo').textContent  = tasks.filter(t => t.status === 'todo').length;
  document.getElementById('stat-inprog').textContent= tasks.filter(t => t.status === 'in_progress').length;
  document.getElementById('stat-done').textContent  = tasks.filter(t => t.status === 'done').length;
}

function renderTasks(tasks) {
  const tbody = document.getElementById('task-tbody');
  if (!tasks.length) {
    tbody.innerHTML = `<tr><td colspan="5">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>No tasks found</div>
        <div style="font-size:0.8rem;margin-top:0.3rem;">Create one with the button above</div>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = tasks.map(t => `
    <tr>
      <td>
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
      </td>
      <td><span class="badge badge-${t.status}">${fmtStatus(t.status)}</span></td>
      <td><span class="badge badge-${t.priority}">${cap(t.priority)}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--muted);">
        ${t.dueDate ? t.dueDate : '—'}
      </td>
      <td>
        <div class="action-btns">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal(${JSON.stringify(t).replace(/"/g,'&quot;')})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">Del</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── Modal ─────────────────────────────────
function openCreateModal() {
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('modal-task-id').value     = '';
  document.getElementById('modal-task-title').value  = '';
  document.getElementById('modal-task-desc').value   = '';
  document.getElementById('modal-task-status').value = 'todo';
  document.getElementById('modal-task-priority').value = 'medium';
  document.getElementById('modal-task-due').value    = '';
  document.getElementById('modal-save-btn').textContent = 'Create Task';
  document.getElementById('task-modal').style.display = 'flex';
}

function openEditModal(task) {
  document.getElementById('modal-title').textContent    = 'Edit Task';
  document.getElementById('modal-task-id').value        = task.id;
  document.getElementById('modal-task-title').value     = task.title || '';
  document.getElementById('modal-task-desc').value      = task.description || '';
  document.getElementById('modal-task-status').value    = task.status || 'todo';
  document.getElementById('modal-task-priority').value  = task.priority || 'medium';
  document.getElementById('modal-task-due').value       = task.dueDate || '';
  document.getElementById('modal-save-btn').textContent = 'Update Task';
  document.getElementById('task-modal').style.display   = 'flex';
}

function closeModal() {
  document.getElementById('task-modal').style.display = 'none';
}
function closeModalOnOverlay(e) {
  if (e.target.id === 'task-modal') closeModal();
}

async function saveTask() {
  const id       = document.getElementById('modal-task-id').value;
  const title    = document.getElementById('modal-task-title').value.trim();
  const desc     = document.getElementById('modal-task-desc').value.trim();
  const status   = document.getElementById('modal-task-status').value;
  const priority = document.getElementById('modal-task-priority').value;
  const dueDate  = document.getElementById('modal-task-due').value || null;

  if (!title) return toast('Title is required', 'error');

  const btn = document.getElementById('modal-save-btn');
  setLoading(btn, true);
  try {
    const body = { title, description: desc, status, priority, dueDate };
    if (id) {
      await apiFetch(`/tasks/${id}`, 'PUT', body);
      toast('Task updated ✓', 'success');
    } else {
      await apiFetch('/tasks', 'POST', body);
      toast('Task created ✓', 'success');
    }
    closeModal();
    loadTasks();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(btn, false, id ? 'Update Task' : 'Create Task');
  }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiFetch(`/tasks/${id}`, 'DELETE');
    toast('Task deleted', 'info');
    loadTasks();
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── Pagination ────────────────────────────
function changePage(dir) {
  const next = currentPage + dir;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  loadTasks();
}

// ── Search debounce ───────────────────────
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadTasks(); }, 400);
}

// ── API helper ────────────────────────────
async function apiFetch(path, method = 'GET', body = null, auth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && token) headers['Authorization'] = `Bearer ${token}`;

  const res = await fetch(`${API}${path}`, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });

  const data = await res.json();

  if (!res.ok) {
    if (res.status === 401) {
      token = null; currentUser = null;
      localStorage.removeItem('tf_token');
      localStorage.removeItem('tf_user');
      document.getElementById('app-page').style.display  = 'none';
      document.getElementById('auth-page').style.display = 'flex';
    }
    const errMsg = data.errors?.[0]?.message || data.message || 'Something went wrong';
    throw new Error(errMsg);
  }
  return data;
}

// ── Helpers ───────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  el.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function setLoading(btn, loading, label = '') {
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span> Loading…' : label || btn.textContent;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtStatus(s) {
  return { todo:'To Do', in_progress:'In Progress', done:'Done' }[s] || s;
}

function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }
</script>
</body>
</html>
