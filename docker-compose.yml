version: '3.9'

services:
  api:
    build: .
    container_name: taskflow_api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: taskflow_db
      DB_USER: taskflow
      DB_PASSWORD: taskflow_pass
      JWT_SECRET: change_this_secret_in_production_32chars
      JWT_REFRESH_SECRET: change_this_refresh_secret_in_production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: taskflow_db
      MYSQL_USER: taskflow
      MYSQL_PASSWORD: taskflow_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional Redis for caching
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  mysql_data:
